appId: com.woosdom.pixel-agents
productName: Pixel Agents Woosdom
mac:
  category: public.app-category.developer-tools
  identity: null
  target:
    - target: dmg
      arch:
        - arm64
        - x64
directories:
  output: release
  buildResources: build
files:
  - "!**/*"
  - dist
  - dist-electron
  - config
asar: true
asarUnpack:
  - "config/**"
