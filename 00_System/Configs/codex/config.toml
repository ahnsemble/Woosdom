# ═══════════════════════════════════════════════════════════════════════
# Woosdom Codex Config — Multi-Agent Dispatch
# 위치: ~/.codex/config.toml (이 파일을 복사)
# 생성: 2026-03-07 | Brain v3.1 기준
# ═══════════════════════════════════════════════════════════════════════

# ── 기본 모델 설정 ────────────────────────────────────────────────────
model = "gpt-5.4"
approval_mode = "on-request"
sandbox_permissions = "workspace-write"
model_reasoning_effort = "xhigh"

# ── 멀티에이전트 활성화 ───────────────────────────────────────────────
[features]
multi_agent = true

[agents]
max_threads = 3      # cmp-parallel-coordinator Hard Rule: 동시 에이전트 최대 3개
max_depth = 1        # 서브에이전트가 다시 서브에이전트 소환하지 않음

# ═══════════════════════════════════════════════════════════════════════
# Compute Division — 수치 연산, 데이터 파이프라인
# ═══════════════════════════════════════════════════════════════════════

[agents.compute-lead]
description = "연산 총괄. 파이프라인 설계, 리소스 배분, 결과 검증. 이상치 감지 시 Brain에 보고."
config_file = "agents/compute-lead.toml"

[agents.sandbox-runner]
description = "샌드박스 Python/Node 실행. 코드 무변조 실행 + 결과 수집. 코드 수정 금지."
config_file = "agents/sandbox-runner.toml"

[agents.data-wrangler]
description = "데이터 전처리, 클리닝, 스키마 검증. 원본 덮어쓰기 금지. _cleaned 접미사 출력."
config_file = "agents/data-wrangler.toml"

[agents.parallel-coordinator]
description = "병렬 연산 오케스트레이션. DAG 의존성 분석, 결과 합산 정합성 검증."
config_file = "agents/parallel-coordinator.toml"

# ═══════════════════════════════════════════════════════════════════════
# Finance Division — 금융 수치 연산 전용
# ═══════════════════════════════════════════════════════════════════════

[agents.fin-quant]
description = "FV/PV/드리프트/샤프 비율 등 금융 수식 코드 실행. 4중 Sanity Check 필수. LLM 자체 연산 금지."
config_file = "agents/fin-quant.toml"

[agents.fin-backtester]
description = "Monte Carlo/Bootstrap/스트레스 테스트 실행. MDD -40% 방어 필터 해제 금지. 수렴 검증 필수."
config_file = "agents/fin-backtester.toml"

# ═══════════════════════════════════════════════════════════════════════
# Engineering Division — 코드 리뷰, 리팩토링
# ═══════════════════════════════════════════════════════════════════════

[agents.eng-critic]
description = "코드 리뷰 전문. 읽기 전용, 코드 수정 절대 금지. Blocker/Major/Minor/Nit 4등급 판정."
config_file = "agents/eng-critic.toml"

[agents.eng-refactorer]
description = "리팩토링 전용. 동작 변경 금지, 구조만 변경. 테스트 100% 동일 보존 필수."
config_file = "agents/eng-refactorer.toml"

# ═══════════════════════════════════════════════════════════════════════
# Research Division — 실험, PoC, 벤치마크
# ═══════════════════════════════════════════════════════════════════════

[agents.res-experimenter]
description = "PoC/벤치마크 격리 실행. Minimum Viable Experiment 원칙. 프로덕션 코드 수정 금지."
config_file = "agents/res-experimenter.toml"

